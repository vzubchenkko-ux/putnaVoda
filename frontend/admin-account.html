<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель адміністратора</title>
    <link rel="stylesheet" href="kursova.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background-color: #001427;
            padding: 20px;
            border-radius: 8px;
            color: white;
        }
        .admin-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .admin-nav-item {
            background-color: #cceeff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .admin-nav-item:hover {
            background-color: #001427;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background-color: #cceeff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #001427;
        }
        .recent-activity {
            background-color: #cceeff;
            padding: 20px;
            border-radius: 8px;
        }
        .activity-item {
            padding: 10px;
            border-bottom: 1px solid #001427;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>Панель адміністратора</h1>
            <button id="logoutBtn" onclick="logout()" class="btn">
                <i class="fas fa-sign-out-alt"></i> Вийти
            </button>
        </div>

        <div class="admin-nav">
            <div class="admin-nav-item" onclick="location.href='admin-orders.html'">
                <i class="fas fa-shopping-cart"></i>
                <h3>Управління замовленнями</h3>
                <p>Перегляд та обробка замовлень</p>
            </div>
            <div class="admin-nav-item" onclick="location.href='admin-users.html'">
                <i class="fas fa-users"></i>
                <h3>Користувачі</h3>
                <p>Управління користувачами</p>
            </div>
            <div class="admin-nav-item" onclick="location.href='admin-products.html'">
                <i class="fas fa-box"></i>
                <h3>Товари</h3>
                <p>Управління товарами</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Всього замовлень</h3>
                <div id="totalOrders" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <h3>Активних користувачів</h3>
                <div id="activeUsers" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <h3>Дохід за місяць</h3>
                <div id="monthlyRevenue" class="stat-value">0 ₴</div>
            </div>
        </div>

        <div class="recent-activity">
            <h2>Остання активність</h2>
            <div id="activityList">
                <!-- Активність буде додана через JavaScript -->
            </div>
        </div>
    </div>

    <script src="admin-account.js"></script>
</body>
</html>
